<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません — Rainbow Project</title>
  <meta name="description" content="お探しのページは見つかりませんでした。">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#FDFCFB">

  <link rel="icon" type="image/svg+xml" href="/rainbow-fxkit/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/rainbow-fxkit/css/style.css">

  <!-- BudouX: 日本語の自然な改行位置を自動挿入 (<budoux-ja>で囲った要素に適用) -->
  <script async src="https://unpkg.com/budoux/bundle/budoux-ja.min.js"></script>
</head>
<body>

  <header class="nav is-scrolled" id="nav" role="banner">
    <div class="container nav__inner">
      <a href="/rainbow-fxkit/" class="nav__logo">
        <img src="/rainbow-fxkit/assets/logo.svg" alt="" width="32" height="32">
        <span>Rainbow Project</span>
      </a>
    </div>
  </header>

  <main>
    <section class="err" role="alert">
      <div>
        <p class="err__code">404</p>
        <h1 style="font-size:clamp(1.5rem, 4vw, 2rem);margin-bottom:var(--space-3);">
          <budoux-ja>このページは虹の向こうに隠れてしまったようです</budoux-ja> 🌈
        </h1>
        <p class="err__msg">
          <budoux-ja>お探しのページは、削除されたか、URL が変更された可能性があります。</budoux-ja><br>
          <budoux-ja>トップページからお目当てのツールを探してみてください。</budoux-ja>
        </p>
        <p style="display:flex;gap:var(--space-3);justify-content:center;flex-wrap:wrap;">
          <a href="/rainbow-fxkit/" class="btn btn--primary btn--lg">🏠 トップページへ戻る</a>
          <a href="/rainbow-fxkit/docs/" class="btn btn--outline btn--lg">📄 仕様書一覧を見る</a>
        </p>
      </div>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer__inner">
        <a href="/rainbow-fxkit/" class="footer__logo">
          <img src="/rainbow-fxkit/assets/logo.svg" alt="" width="28" height="28">
          <span>Rainbow Project</span>
        </a>
        <ul class="footer__links">
          <li><a href="/rainbow-fxkit/#tools">ツール一覧</a></li>
          <li><a href="/rainbow-fxkit/about.html">プロジェクトについて</a></li>
          <li><a href="/rainbow-fxkit/docs/">仕様書</a></li>
          <li><a href="/rainbow-fxkit/disclaimer.html">免責事項</a></li>
        </ul>
        <p class="footer__copy">© Rainbow Project. All rights reserved.</p>
      </div>
    </div>
    <div class="footer__bar" aria-hidden="true"></div>
  </footer>

</body>
</html>
